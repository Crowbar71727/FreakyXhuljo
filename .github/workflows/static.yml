name: Deploy Tailwind Site
on:
  push:
    branches: ["main"]
  workflow_dispatch: # This adds a "Run workflow" button to the Actions tab
  
    permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tailwind & Build
        run: |
          npm install -D tailwindcss @tailwindcss/cli
          npx @tailwindcss/cli -i ./krafton-style.css -o ./style.css # Adjust file names as needed

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your entire root folder

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
